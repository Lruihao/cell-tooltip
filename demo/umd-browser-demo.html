<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cell-tooltip UMD 浏览器直引 Demo</title>
    <style>
      :root {
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #0f172a;
        background: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .wrap {
        width: min(760px, 100%);
      }

      h1 {
        margin: 0;
        font-size: 30px;
      }

      p {
        color: #475569;
      }

      .panel {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 16px;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        background: #fff;
      }

      .btn {
        border: 1px solid #cbd5e1;
        background: #fff;
        color: #0f172a;
        border-radius: 8px;
        padding: 9px 14px;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>UMD 浏览器直引 Demo</h1>
      <p>不使用打包工具，直接通过 script 标签加载 <code>cell-tooltip.umd.cjs</code>。</p>

      <section class="panel">
        <button class="btn" data-ct-title="顶部提示" data-ct-placement="top">Hover Top</button>
        <button
          class="btn"
          data-ct-title="右侧点击提示"
          data-ct-placement="right"
          data-ct-trigger="click"
        >
          Click Right
        </button>
        <button class="btn" data-ct-title="自动方向" data-ct-placement="auto">Auto</button>
        <button id="manualBtn" class="btn">Manual Toggle</button>
      </section>
    </main>

    <script src="../dist/cell-tooltip.umd.cjs"></script>
    <script>
      const { Tooltip } = window.CellTooltip

      Tooltip.initAll('.btn[data-ct-title]')

      const manualBtn = document.getElementById('manualBtn')
      if (manualBtn instanceof HTMLElement) {
        const manual = Tooltip.getOrCreateInstance(manualBtn, {
          title: '手动触发',
          trigger: 'manual',
          placement: 'bottom',
        })

        manualBtn.addEventListener('click', () => manual.toggle())
      }
    </script>
  </body>
</html>
